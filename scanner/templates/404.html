{% extends "base.html" %}

{% block title %}Page Not Found - SafeCareer{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8 text-center">
            <div style="padding: 40px;">
                <h1 style="font-size: 120px; color: #ff6b6b; margin: 0;">404</h1>
                <h2 class="mt-3 mb-3">Page Not Found</h2>
                <p class="text-muted" style="font-size: 16px;">
                    Sorry, the page you're looking for doesn't exist or has been moved.
                </p>
                
                <div class="mt-5">
                    <a href="{% url 'home' %}" class="btn btn-primary btn-lg me-2">
                        <i class="fas fa-home"></i> Go Home
                    </a>
                    <a href="{% url 'contact' %}" class="btn btn-secondary btn-lg">
                        <i class="fas fa-envelope"></i> Contact Us
                    </a>
                </div>

                <div class="mt-5">
                    <h5>Useful Links:</h5>
                    <ul class="list-unstyled">
                        <li><a href="{% url 'scan_job' %}">Scan Job Posting</a></li>
                        <li><a href="{% url 'about' %}">About Us</a></li>
                        <li><a href="{% url 'login_select' %}">Login</a></li>
                    </ul>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    .container {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        border-radius: 10px;
        color: white;
        margin-top: 50px;
    }
    
    a {
        color: #667eea;
        text-decoration: none;
    }
    
    a:hover {
        text-decoration: underline;
    }
</style>
{% endblock %}
