<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | SafeCareer</title>
    <style>
        :root {
            --primary-dark: #0f172a; 
            --primary-blue: #2563eb; 
            --blue-hover: #1d4ed8;
            --bg-light: #f1f5f9;
            --text-main: #334155;
            --text-muted: #64748b;
            --danger-red: #ef4444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }

        body {
            background-color: var(--bg-light);
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            background-image: radial-gradient(#cbd5e1 1px, transparent 1px);
            background-size: 30px 30px;
        }

        .auth-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.08);
            max-width: 450px;
            width: 100%;
            padding: 40px;
            text-align: center;
        }

        .logo {
            font-size: 28px; font-weight: 800; color: var(--primary-dark);
            text-decoration: none; display: flex; align-items: center; justify-content: center; gap: 8px;
            margin-bottom: 30px;
        }
        .logo span { color: var(--primary-blue); }

        h3 { font-size: 1.8rem; color: var(--primary-dark); margin-bottom: 12px; }
        p { color: var(--text-muted); margin-bottom: 30px; font-size: 0.95rem; line-height: 1.5; }

        .error-msg {
            background-color: #fee2e2; color: var(--danger-red);
            padding: 12px; border-radius: 10px; margin-bottom: 25px;
            font-size: 0.9rem; font-weight: 600; border: 1px solid var(--danger-red);
        }

        .form-group { margin-bottom: 22px; text-align: left; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 0.9rem; color: var(--primary-dark); }
        .form-group input {
            width: 100%; padding: 14px 16px; border: 1.5px solid #cbd5e1;
            border-radius: 10px; font-size: 1rem; transition: 0.2s;
            background: #f8fafc;
        }
        .form-group input:focus {
            outline: none; border-color: var(--primary-blue); background: white;
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
        }

        .btn-submit {
            width: 100%; background: var(--primary-blue); color: white; border: none;
            padding: 15px; font-size: 1.05rem; font-weight: bold; border-radius: 10px; cursor: pointer; transition: 0.2s;
            margin-bottom: 20px;
        }
        .btn-submit:hover { background: var(--blue-hover); transform: translateY(-2px); box-shadow: 0 4px 12px rgba(37,99,235,0.2); }

        .back-link { font-size: 0.9rem; color: var(--primary-blue); text-decoration: none; font-weight: 600; }
        .back-link:hover { text-decoration: underline; }

    </style>
</head>
<body>

    <div class="auth-container">
        <a href="/" class="logo">🛡️ Safe<span>Career</span></a>
        
        <h3>Reset Password</h3>
        <p>Enter your email and we'll send an OTP to verify your identity.</p>

        {% if error %}
        <div class="error-msg">
            ⚠️ {{ error }}
        </div>
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" required placeholder="name@example.com">
            </div>

            <button type="submit" class="btn-submit">Send OTP</button>
        </form>

        <a href="{% url 'login_select' %}" class="back-link">← Back to Login</a>
    </div>

</body>
</html>
