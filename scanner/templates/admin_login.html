{% extends 'base.html' %}

{% block title %}Admin Login | SafeCareer{% endblock %}

{% block extra_css %}
<style>
    /* Center the login card vertically and horizontally */
    .admin-login-wrapper {
        display: flex;
        justify-content: center;
        align-items: center;
        /* Uses flex-grow in base.html, but this ensures it takes up available space */
        min-height: calc(100vh - 200px); 
        padding: 40px 20px;
    }

    .admin-card {
        background: white;
        width: 100%;
        max-width: 420px;
        padding: 40px 35px;
        border-radius: 16px;
        box-shadow: 0 15px 35px rgba(0,0,0,0.08);
        border-top: 5px solid var(--primary-dark); /* Dark border for Admin feel */
    }

    .admin-header {
        text-align: center;
        margin-bottom: 25px;
    }

    .admin-header h2 {
        color: var(--primary-dark);
        margin-bottom: 5px;
        font-size: 1.8rem;
        font-weight: 800;
    }

    .admin-header p {
        color: var(--text-muted);
        font-size: 0.95rem;
    }

    .error-msg {
        background-color: #fee2e2;
        color: var(--danger-red);
        padding: 12px 15px;
        border-radius: 8px;
        margin-bottom: 20px;
        font-size: 0.9rem;
        font-weight: 600;
        border-left: 4px solid var(--danger-red);
    }

    .form-group {
        margin-bottom: 20px;
    }

    .form-group label {
        display: block;
        margin-bottom: 8px;
        font-weight: 600;
        font-size: 0.9rem;
        color: var(--primary-dark);
    }

    .form-group input {
        width: 100%;
        padding: 14px 15px;
        border: 1px solid #cbd5e1;
        border-radius: 8px;
        font-size: 1rem;
        background: #f8fafc;
        transition: 0.2s ease;
    }

    .form-group input:focus {
        outline: none;
        border-color: var(--primary-dark);
        background: white;
        box-shadow: 0 0 0 3px rgba(15, 23, 42, 0.1);
    }

    .btn-admin {
        width: 100%;
        padding: 15px;
        background: var(--primary-dark); /* Dark button for Admin */
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 1.05rem;
        font-weight: bold;
        cursor: pointer;
        transition: 0.2s ease;
        margin-top: 10px;
    }

    .btn-admin:hover {
        background: #1e293b;
        transform: translateY(-2px);
        box-shadow: 0 4px 12px rgba(15, 23, 42, 0.2);
    }
</style>
{% endblock %}

{% block content %}
<div class="admin-login-wrapper">
    <div class="admin-card">
        
        <div class="admin-header">
            <h2>🛡️ Admin Access</h2>
            <p>Secure portal for moderation and system control.</p>
        </div>

        {% if error %}
            <div class="error-msg">⚠️ {{ error }}</div>
        {% endif %}

        <form method="POST" action="{% url 'admin_login' %}">
            {% csrf_token %}
            
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Enter admin username" required autocomplete="username">
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required autocomplete="current-password">
            </div>

            <button type="submit" class="btn-admin">Secure Login</button>
        </form>
        
    </div>
</div>
{% endblock %}
